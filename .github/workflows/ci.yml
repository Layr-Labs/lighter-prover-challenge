name: ci

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: [self-hosted, macOS, ARM64, lighter-prover-challenge-m3]
    timeout-minutes: 60
    env:
      # Keep in sync with setup.sh / run-ranked-benchmark.sh so the cache key
      # (and the shared dependency cache) matches the ranked benchmark job.
      RUSTFLAGS: "-C target-cpu=native"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate files
        run: |
          bash -n setup.sh benchmark.sh .github/scripts/*.sh
          jq -e . benchmark.json challenge/ranked-score.schema.json >/dev/null

      # Self-hosted runners provision rustup persistently. Re-install the
      # manager only if it is missing (e.g. after a cache-tool cleaned
      # ~/.cargo/bin); the pinned toolchains under ~/.rustup are untouched.
      - name: Ensure rustup is available
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
              | sh -s -- -y --default-toolchain none --no-modify-path --profile minimal
          fi
          echo "${CARGO_HOME:-${HOME}/.cargo}/bin" >> "${GITHUB_PATH}"

      # Install the pinned toolchain before rust-cache so its key derivation
      # (`rustc -vV`) sees the correct compiler.
      - name: Install pinned Rust toolchain
        run: |
          set -euo pipefail
          toolchain="$(tr -d '[:space:]' < rust-toolchain)"
          rustup toolchain install "${toolchain}" --profile minimal --no-self-update

      # Shares the dependency-artifact cache with the ranked benchmark job via
      # `shared-key`: same manifest, toolchain, and RUSTFLAGS produce identical
      # dependency builds. Only dependency artifacts are cached; local crates
      # always rebuild from clean sources.
      - name: Cache Rust dependency artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: challenge
          shared-key: challenge-deps
          # This runner is long-lived: never let the cache cleaner delete the
          # persistently installed rustup/cargo/rustc from ~/.cargo/bin.
          cache-bin: "false"

      - name: Run public benchmark
        run: |
          ./setup.sh
          ./benchmark.sh --local-iterate
