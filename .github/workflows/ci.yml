name: ci

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate files
        run: |
          bash -n setup.sh benchmark.sh .github/scripts/*.sh
          jq -e . benchmark.json challenge/ranked-score.schema.json >/dev/null

      - name: Run public benchmark
        run: |
          ./setup.sh
          ./benchmark.sh --local-iterate
