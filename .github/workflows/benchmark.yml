name: ranked benchmark

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Full submission commit SHA
        required: true
        type: string

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: [self-hosted, lighter-prover-bench]
    environment: lighter-prover-private
    timeout-minutes: 180
    steps:
      - name: Require trusted workflow
        run: test "${GITHUB_REF}" = refs/heads/main

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          persist-credentials: false

      - name: Run trusted benchmark
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: |
          [[ "${CANDIDATE_SHA}" =~ ^[0-9a-f]{40}$ ]]
          /opt/lighter-bench/run \
            --trusted-repo "${GITHUB_WORKSPACE}" \
            --candidate "${CANDIDATE_SHA}" \
            --cases /opt/lighter-bench/private \
            --output score.json
          jq -e '.passed == true and .score > 0 and .score == .metrics.speedup' score.json >/dev/null
          shasum -a 256 score.json > score.json.sha256

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lighter-prover-score-${{ github.run_id }}
          path: |
            score.json
            score.json.sha256

      - name: Clean runner
        if: always()
        run: /opt/lighter-bench/run --clean
