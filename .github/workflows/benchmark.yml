name: ranked benchmark

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighter-prover-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: [self-hosted, macOS, ARM64, lighter-prover-challenge-m3]
    timeout-minutes: 180
    env:
      LIGHTER_REQUIRE_SANDBOX: "1"
      LIGHTER_BENCHMARK_MODE: official-throughput
      LIGHTER_TRANSACTIONS: "500"
      RUSTFLAGS: -C target-cpu=native

    steps:
      - name: Checkout dispatched commit
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.sha }}
          clean: true
          persist-credentials: false

      - name: Host preflight
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(uname -s)" == Darwin ]]
          [[ "$(uname -m)" == arm64 ]]
          command -v cargo
          command -v codesign
          command -v rustup
          command -v sandbox-exec
          command -v shasum

      - name: Setup benchmark
        run: ./setup.sh

      - name: Benchmark submission
        run: ./benchmark.sh

      - name: Upload score
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6fb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: lighter-prover-score-${{ github.run_id }}
          path: score.json
          if-no-files-found: error
