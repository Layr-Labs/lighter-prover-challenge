name: ranked benchmark

# Run ranked evaluations only when an operator explicitly dispatches them.
# GitHub uses the workflow definition and commit from the dispatched ref, so
# access to allowed refs is part of this workflow's security boundary.
on:
  workflow_dispatch:

# Neither job needs to modify repository contents.
permissions:
  contents: read

# Start every run step with a clean Bash process and strict error handling.
defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

# Keep at most one ranked run active for a given ref. A newer dispatch replaces
# an older run for that same ref.
concurrency:
  group: lighter-prover-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compile candidate-controlled source without giving the job access to the
  # private-fixture Environment or its R2 credentials.
  build:
    runs-on: [self-hosted, macOS, ARM64, lighter-prover-challenge-m3]
    timeout-minutes: 180
    env:
      # Prevent candidate or host Git configuration from changing Git behavior.
      GIT_CONFIG_GLOBAL: /dev/null
      GIT_CONFIG_NOSYSTEM: "1"

    steps:
      # Materialize exactly the commit selected by workflow_dispatch. Do not
      # persist credentials or add the candidate workspace to safe.directory.
      - name: Checkout candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.sha }}
          clean: true
          persist-credentials: false
          set-safe-directory: false

      # Fail before archiving or building unless the dispatched ref is the
      # default branch or a branch in the submissions namespace.
      - name: Guard ranked ref
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_TYPE}" == branch ]]
          [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ||
             "${GITHUB_REF_NAME}" == submissions/* ]] || {
            echo "ranked benchmark ref is not allowed: ${GITHUB_REF_NAME}" >&2
            exit 1
          }

      # Verify the fixed root bridge and all paths crossing into it. The bridge
      # is the host-installed privilege boundary that runs candidate work as the
      # disposable benchmark identity.
      - name: Host bridge preflight
        shell: bash
        run: |
          set -euo pipefail
          bridge="/opt/lighter-prover-challenge/bench-exec.sh"
          work_root="/opt/lighter-prover-challenge/work"
          [[ "$(/usr/bin/uname -s)" == Darwin ]]
          [[ "$(/usr/bin/uname -m)" == arm64 ]]
          [[ -f "${bridge}" && ! -L "${bridge}" && -x "${bridge}" ]]
          [[ "$(/usr/bin/stat -Lf "%u" "${bridge}")" == 0 ]]
          bridge_mode="$(/usr/bin/stat -Lf "%Lp" "${bridge}")"
          [[ "${bridge_mode}" =~ ^[0-7]{3,4}$ ]]
          (( (8#${bridge_mode} & 8#022) == 0 ))
          [[ -x /usr/bin/git ]]
          [[ -x /usr/bin/shasum ]]
          [[ -d "${RUNNER_TEMP:?}" && ! -L "${RUNNER_TEMP}" ]]
          case "${RUNNER_TEMP:?}" in
            "${work_root}"/*) ;;
            *) echo "runner temp is outside the bridge work root" >&2; exit 1 ;;
          esac
          case "${GITHUB_WORKSPACE:?}" in
            "${work_root}"/*) ;;
            *) echo "workspace is outside the bridge work root" >&2; exit 1 ;;
          esac
          /usr/bin/sudo -n -l "${bridge}" >/dev/null

      # Produce a regular Git archive instead of letting the root bridge consume
      # the mutable checkout directly. A minimal environment constrains Git's
      # configuration and executable search path.
      - name: Archive candidate source
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          archive="${RUNNER_TEMP}/lighter-candidate-source.tar"
          /bin/rm -f -- "${archive}"
          (
            cd "${GITHUB_WORKSPACE}"
            /usr/bin/env -i \
              HOME="${RUNNER_TEMP}" \
              PATH="/usr/bin:/bin" \
              GIT_CONFIG_GLOBAL=/dev/null \
              GIT_CONFIG_NOSYSTEM=1 \
              /usr/bin/git archive --format=tar HEAD
          ) > "${archive}"
          /bin/chmod 0644 "${archive}"
          [[ -f "${archive}" && ! -L "${archive}" ]]
          [[ "$(/usr/bin/stat -Lf "%z" "${archive}")" -gt 0 ]]

      # Ask the root bridge to extract and compile the archive under the
      # disposable benchmark user. Stage only the resulting worker and its
      # checksum in a runner-private directory.
      - name: Build and stage candidate artifact
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/lighter-candidate-source.tar"
          artifact_dir="${RUNNER_TEMP:?}/lighter-candidate-build"
          /bin/rm -rf -- "${artifact_dir}"
          /usr/bin/install -d -m 0700 "${artifact_dir}"
          worker="${artifact_dir}/prove"

          [[ -f "${archive}" && ! -L "${archive}" ]]
          /usr/bin/sudo -n /opt/lighter-prover-challenge/bench-exec.sh build \
            "${archive}" "${worker}"
          [[ -f "${worker}" && ! -L "${worker}" ]]
          (
            cd "${artifact_dir}"
            /usr/bin/shasum -a 256 prove > prove.sha256
          )

      # Transfer the worker to the credentialed job using an artifact name that
      # is unique to this workflow run and retry attempt.
      - name: Upload candidate artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighter-prover-candidate-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/lighter-candidate-build/prove
            ${{ runner.temp }}/lighter-candidate-build/prove.sha256
          if-no-files-found: error

  # Run the prebuilt candidate against the private fixture. This job starts only
  # after the uncredentialed build succeeds and is the sole consumer of the
  # benchmark-private-data Environment.
  benchmark:
    needs: build
    runs-on: [self-hosted, macOS, ARM64, lighter-prover-challenge-m3]
    timeout-minutes: 180
    environment: benchmark-private-data
    env:
      # Use only fixed system executables and ignore all user/system Git and AWS
      # configuration. Disable cloud instance-metadata credential discovery.
      PATH: /usr/bin:/bin:/usr/sbin:/sbin
      GIT_CONFIG_GLOBAL: /dev/null
      GIT_CONFIG_NOSYSTEM: "1"
      AWS_CONFIG_FILE: /dev/null
      AWS_SHARED_CREDENTIALS_FILE: /dev/null
      AWS_EC2_METADATA_DISABLED: "true"
      R2_AWS_CLI: /usr/local/bin/aws

      # Require the ranked host bridge and fixed benchmark parameters. Record
      # the dispatched commit, rather than the trusted harness checkout, as the
      # candidate provenance in score.json.
      LIGHTER_REQUIRE_SANDBOX: "1"
      LIGHTER_USE_BENCH_BRIDGE: "1"
      LIGHTER_BENCHMARK_MODE: official-throughput
      LIGHTER_TRANSACTIONS: "500"
      LIGHTER_CANDIDATE_SHA: ${{ github.sha }}
      LIGHTER_PRIVATE_FIXTURE_R2_PATH: fixtures/ranked-v1.json
      LIGHTER_PRIVATE_FIXTURE_SHA256: ${{ vars.LIGHTER_PRIVATE_FIXTURE_SHA256 }}
      R2_BUCKET: lighter-prover-private

    steps:
      # Replace the candidate checkout with benchmark scripts and verifier data
      # from the repository's trusted default branch.
      - name: Checkout trusted benchmark harness
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          clean: true
          persist-credentials: false
          set-safe-directory: false

      # Fail closed unless the runner, bridge, work directories, PATH entries,
      # AWS CLI, sandbox tools, and committed verifier all match the expected
      # ownership, permission, checksum, and code-signing requirements.
      - name: Host preflight
        shell: bash
        run: |
          set -euo pipefail
          bridge="/opt/lighter-prover-challenge/bench-exec.sh"
          work_root="/opt/lighter-prover-challenge/work"
          [[ "$(/usr/bin/uname -s)" == Darwin ]]
          [[ "$(/usr/bin/uname -m)" == arm64 ]]
          [[ -f "${bridge}" && ! -L "${bridge}" && -x "${bridge}" ]]
          [[ "$(/usr/bin/stat -Lf "%u" "${bridge}")" == 0 ]]
          bridge_mode="$(/usr/bin/stat -Lf "%Lp" "${bridge}")"
          [[ "${bridge_mode}" =~ ^[0-7]{3,4}$ ]]
          (( (8#${bridge_mode} & 8#022) == 0 ))
          /usr/bin/sudo -n -l "${bridge}" >/dev/null
          [[ -d "${RUNNER_TEMP:?}" && ! -L "${RUNNER_TEMP}" ]]
          case "${RUNNER_TEMP:?}" in
            "${work_root}"/*) ;;
            *) echo "runner temp is outside the bridge work root" >&2; exit 1 ;;
          esac
          case "${GITHUB_WORKSPACE:?}" in
            "${work_root}"/*) ;;
            *) echo "workspace is outside the bridge work root" >&2; exit 1 ;;
          esac
          [[ -x benchmark-tools/trusted/lighter-benchmark-verifier ]]
          [[ -f .github/scripts/prove-via-bench.sh &&
             ! -L .github/scripts/prove-via-bench.sh ]]
          [[ -x "${R2_AWS_CLI}" ]]
          old_ifs="${IFS}"
          IFS=:
          read -r -a path_entries <<< "${PATH}"
          IFS="${old_ifs}"
          for path_entry in "${path_entries[@]}"; do
            [[ -d "${path_entry}" && ! -w "${path_entry}" ]]
            [[ "$(/usr/bin/stat -Lf "%u" "${path_entry}")" == 0 ]]
            path_mode="$(/usr/bin/stat -Lf "%Lp" "${path_entry}")"
            [[ "${path_mode}" =~ ^[0-7]{3,4}$ ]]
            (( (8#${path_mode} & 8#022) == 0 ))
          done
          [[ ! -w "${R2_AWS_CLI}" ]]
          [[ "$(/usr/bin/stat -Lf "%u" "${R2_AWS_CLI}")" == 0 ]]
          aws_mode="$(/usr/bin/stat -Lf "%Lp" "${R2_AWS_CLI}")"
          [[ "${aws_mode}" =~ ^[0-7]{3,4}$ ]]
          (( (8#${aws_mode} & 8#022) == 0 ))
          [[ -x /usr/bin/codesign ]]
          [[ -x /usr/bin/sandbox-exec ]]
          [[ -x /usr/bin/shasum ]]
          (
            cd benchmark-tools/trusted
            /usr/bin/shasum -a 256 -c SHA256SUMS
          )
          /usr/bin/codesign --verify --strict \
            benchmark-tools/trusted/lighter-benchmark-verifier

      # Create an empty private destination before the artifact action writes
      # files into it.
      - name: Prepare artifact download
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP:?}/lighter-candidate-artifact"
          /bin/rm -rf "${artifact_dir}"
          /usr/bin/install -d -m 0700 "${artifact_dir}"

      # Fetch only the artifact produced by this run and attempt.
      - name: Download candidate artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lighter-prover-candidate-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/lighter-candidate-artifact

      # Require exactly a regular worker and one canonical checksum file, verify
      # their integrity, then install the untrusted binary as prove-bin beside
      # the trusted prove wrapper. Export only their paths and digest.
      - name: Validate and install candidate worker
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP:?}/lighter-candidate-artifact"
          [[ -d "${artifact_dir}" && ! -L "${artifact_dir}" ]]
          artifact_entry_count="$(
            /usr/bin/find "${artifact_dir}" -mindepth 1 -maxdepth 1 -print |
              /usr/bin/wc -l | /usr/bin/tr -d '[:space:]'
          )"
          [[ "${artifact_entry_count}" == 2 ]]
          [[ -f "${artifact_dir}/prove" && ! -L "${artifact_dir}/prove" ]]
          [[ -f "${artifact_dir}/prove.sha256" && ! -L "${artifact_dir}/prove.sha256" ]]
          [[ "$(/usr/bin/wc -l < "${artifact_dir}/prove.sha256" | /usr/bin/tr -d '[:space:]')" == 1 ]]
          checksum_line="$(< "${artifact_dir}/prove.sha256")"
          checksum_pattern='^[0-9a-f]{64}  prove$'
          [[ "${checksum_line}" =~ ${checksum_pattern} ]]
          (
            cd "${artifact_dir}"
            /usr/bin/shasum -a 256 -c prove.sha256
          )
          expected_sha256="${checksum_line%%  *}"

          candidate_root="$(/usr/bin/mktemp -d "${RUNNER_TEMP}/lighter-candidate-root.XXXXXX")"
          /usr/bin/install -d -m 0755 "${candidate_root}/target/release"
          /usr/bin/install -m 0755 "${artifact_dir}/prove" \
            "${candidate_root}/target/release/prove-bin"
          /usr/bin/install -m 0755 ".github/scripts/prove-via-bench.sh" \
            "${candidate_root}/target/release/prove"
          printf 'LIGHTER_CANDIDATE_ROOT=%s\n' "${candidate_root}" >> "${GITHUB_ENV}"
          printf 'LIGHTER_CANDIDATE_SHA256=%s\n' "${expected_sha256}" >> "${GITHUB_ENV}"

      # This is the only step that receives R2 credentials. Download the fixture
      # into a private directory, verify its configured digest, erase credentials
      # from the environment, recheck the candidate binary, and invoke the
      # trusted verifier through benchmark.sh.
      - name: Benchmark submission
        env:
          TMPDIR: ${{ runner.temp }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_BUCKET_ENDPOINT: ${{ secrets.R2_BUCKET_ENDPOINT }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          private_dir="$(/usr/bin/mktemp -d "${RUNNER_TEMP}/lighter-private.XXXXXX")"
          private_fixture="${private_dir}/bench.json"
          cleanup() {
            /bin/rm -rf "${private_dir}" "${LIGHTER_CANDIDATE_ROOT}"
          }
          trap cleanup EXIT
          /bin/chmod 700 "${private_dir}"

          .github/scripts/download-r2-object.sh \
            "${LIGHTER_PRIVATE_FIXTURE_R2_PATH}" \
            "${private_fixture}" \
            "${LIGHTER_PRIVATE_FIXTURE_SHA256}"

          unset R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET_ENDPOINT
          installed_sha256="$(
            /usr/bin/shasum -a 256 "${LIGHTER_CANDIDATE_ROOT}/target/release/prove-bin" |
              /usr/bin/awk '{ print $1 }'
          )"
          [[ "${installed_sha256}" == "${LIGHTER_CANDIDATE_SHA256}" ]]
          LIGHTER_FIXTURE="${private_fixture}" ./benchmark.sh

      # Publish only a successfully generated score. Because this step does not
      # override normal success gating, benchmark failures upload nothing.
      - name: Upload score
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighter-prover-score-${{ github.run_id }}-${{ github.run_attempt }}
          path: score.json
          if-no-files-found: error
