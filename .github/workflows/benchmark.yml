name: ranked benchmark

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Full submission commit SHA
        required: true
        type: string

permissions:
  contents: read

jobs:
  benchmark:
    # Blacksmith supports 6- and 12-vCPU macOS 26 runners.
    runs-on: blacksmith-12vcpu-macos-26
    timeout-minutes: 180
    steps:
      - name: Host preflight
        run: |
          set -euo pipefail
          test "${GITHUB_REF}" = refs/heads/master
          test "$(uname -s)" = Darwin
          test "$(uname -m)" = arm64
          test -x /usr/bin/sandbox-exec
          command -v cargo jq rustup >/dev/null

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false

      - name: Run paired benchmark
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
        run: .github/scripts/run-ranked-benchmark.sh "${CANDIDATE_SHA}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lighter-prover-score-${{ github.run_id }}
          path: |
            score.json
            score.json.sha256
