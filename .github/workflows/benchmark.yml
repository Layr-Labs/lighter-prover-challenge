name: ranked benchmark

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: [self-hosted, macOS, ARM64, lighter-prover-challenge-m3]
    timeout-minutes: 180
    steps:
      - name: Host preflight
        run: |
          set -euo pipefail
          test "$(uname -s)" = Darwin
          test "$(uname -m)" = arm64
          test -x /usr/bin/sandbox-exec
          command -v cargo jq rustup >/dev/null

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout dispatched branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.sha }}
          path: .lighter-candidate
          fetch-depth: 0
          persist-credentials: false

      - name: Run paired benchmark
        run: .github/scripts/run-ranked-benchmark.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lighter-prover-score-${{ github.run_id }}
          path: |
            score.json
            score.json.sha256
