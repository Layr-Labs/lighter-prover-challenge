name: ranked benchmark

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

concurrency:
  group: lighter-prover-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, macOS, ARM64, lighter-prover-challenge-m3]
    timeout-minutes: 180
    env:
      RUSTFLAGS: -C target-cpu=native

    steps:
      - name: Checkout candidate
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.sha }}
          clean: true
          persist-credentials: false

      - name: Host preflight
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(uname -s)" == Darwin ]]
          [[ "$(uname -m)" == arm64 ]]
          command -v cargo
          command -v codesign
          command -v rustup
          command -v shasum

      - name: Guard ranked ref
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_TYPE}" == branch ]]
          [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ||
             "${GITHUB_REF_NAME}" == submissions/* ]] || {
            echo "ranked benchmark ref is not allowed: ${GITHUB_REF_NAME}" >&2
            exit 1
          }

      - name: Build candidate worker
        run: ./setup.sh

      - name: Stage candidate artifact
        shell: bash
        run: |
          set -euo pipefail
          worker="${GITHUB_WORKSPACE}/target/release/prove"
          [[ -f "${worker}" && ! -L "${worker}" ]]

          artifact_dir="${RUNNER_TEMP:?}/lighter-candidate-build"
          rm -rf "${artifact_dir}"
          install -d -m 0700 "${artifact_dir}"
          install -m 0755 "${worker}" "${artifact_dir}/prove"
          (
            cd "${artifact_dir}"
            shasum -a 256 prove > prove.sha256
          )

      - name: Upload candidate artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighter-prover-candidate-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/lighter-candidate-build/prove
            ${{ runner.temp }}/lighter-candidate-build/prove.sha256
          if-no-files-found: error

  benchmark:
    needs: build
    runs-on: [self-hosted, macOS, ARM64, lighter-prover-challenge-m3]
    timeout-minutes: 180
    environment: benchmark-private-data
    env:
      PATH: /usr/bin:/bin:/usr/sbin:/sbin
      GIT_CONFIG_GLOBAL: /dev/null
      GIT_CONFIG_NOSYSTEM: "1"
      AWS_CONFIG_FILE: /dev/null
      AWS_SHARED_CREDENTIALS_FILE: /dev/null
      AWS_EC2_METADATA_DISABLED: "true"
      R2_AWS_CLI: /usr/local/bin/aws
      LIGHTER_REQUIRE_SANDBOX: "1"
      LIGHTER_BENCHMARK_MODE: official-throughput
      LIGHTER_TRANSACTIONS: "500"
      LIGHTER_CANDIDATE_SHA: ${{ github.sha }}
      LIGHTER_PRIVATE_FIXTURE_R2_PATH: fixtures/ranked-v1.json
      LIGHTER_PRIVATE_FIXTURE_SHA256: ${{ vars.LIGHTER_PRIVATE_FIXTURE_SHA256 }}
      R2_BUCKET: lighter-prover-private

    steps:
      - name: Checkout trusted benchmark harness
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          clean: true
          persist-credentials: false
          set-safe-directory: false

      - name: Host preflight
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(/usr/bin/uname -s)" == Darwin ]]
          [[ "$(/usr/bin/uname -m)" == arm64 ]]
          [[ -x benchmark-tools/trusted/lighter-benchmark-verifier ]]
          [[ -x "${R2_AWS_CLI}" ]]
          old_ifs="${IFS}"
          IFS=:
          read -r -a path_entries <<< "${PATH}"
          IFS="${old_ifs}"
          for path_entry in "${path_entries[@]}"; do
            [[ -d "${path_entry}" && ! -w "${path_entry}" ]]
            [[ "$(/usr/bin/stat -Lf "%u" "${path_entry}")" == 0 ]]
            path_mode="$(/usr/bin/stat -Lf "%Lp" "${path_entry}")"
            [[ "${path_mode}" =~ ^[0-7]{3,4}$ ]]
            (( (8#${path_mode} & 8#022) == 0 ))
          done
          [[ ! -w "${R2_AWS_CLI}" ]]
          [[ "$(/usr/bin/stat -Lf "%u" "${R2_AWS_CLI}")" == 0 ]]
          aws_mode="$(/usr/bin/stat -Lf "%Lp" "${R2_AWS_CLI}")"
          [[ "${aws_mode}" =~ ^[0-7]{3,4}$ ]]
          (( (8#${aws_mode} & 8#022) == 0 ))
          [[ -x /usr/bin/codesign ]]
          [[ -x /usr/bin/sandbox-exec ]]
          [[ -x /usr/bin/shasum ]]
          (
            cd benchmark-tools/trusted
            /usr/bin/shasum -a 256 -c SHA256SUMS
          )
          /usr/bin/codesign --verify --strict \
            benchmark-tools/trusted/lighter-benchmark-verifier

      - name: Prepare artifact download
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP:?}/lighter-candidate-artifact"
          /bin/rm -rf "${artifact_dir}"
          /usr/bin/install -d -m 0700 "${artifact_dir}"

      - name: Download candidate artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lighter-prover-candidate-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/lighter-candidate-artifact

      - name: Validate and install candidate worker
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="${RUNNER_TEMP:?}/lighter-candidate-artifact"
          [[ -d "${artifact_dir}" && ! -L "${artifact_dir}" ]]
          artifact_entry_count="$(
            /usr/bin/find "${artifact_dir}" -mindepth 1 -maxdepth 1 -print |
              /usr/bin/wc -l | /usr/bin/tr -d '[:space:]'
          )"
          [[ "${artifact_entry_count}" == 2 ]]
          [[ -f "${artifact_dir}/prove" && ! -L "${artifact_dir}/prove" ]]
          [[ -f "${artifact_dir}/prove.sha256" && ! -L "${artifact_dir}/prove.sha256" ]]
          [[ "$(/usr/bin/wc -l < "${artifact_dir}/prove.sha256" | /usr/bin/tr -d '[:space:]')" == 1 ]]
          checksum_line="$(< "${artifact_dir}/prove.sha256")"
          checksum_pattern='^[0-9a-f]{64}  prove$'
          [[ "${checksum_line}" =~ ${checksum_pattern} ]]
          (
            cd "${artifact_dir}"
            /usr/bin/shasum -a 256 -c prove.sha256
          )
          expected_sha256="${checksum_line%%  *}"

          candidate_root="$(/usr/bin/mktemp -d "${RUNNER_TEMP}/lighter-candidate-root.XXXXXX")"
          /usr/bin/install -d -m 0755 "${candidate_root}/target/release"
          /usr/bin/install -m 0755 "${artifact_dir}/prove" \
            "${candidate_root}/target/release/prove"
          printf 'LIGHTER_CANDIDATE_ROOT=%s\n' "${candidate_root}" >> "${GITHUB_ENV}"
          printf 'LIGHTER_CANDIDATE_SHA256=%s\n' "${expected_sha256}" >> "${GITHUB_ENV}"

      - name: Benchmark submission
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_BUCKET_ENDPOINT: ${{ secrets.R2_BUCKET_ENDPOINT }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          private_dir="$(/usr/bin/mktemp -d "${RUNNER_TEMP}/lighter-private.XXXXXX")"
          private_fixture="${private_dir}/bench.json"
          cleanup() {
            /bin/rm -rf "${private_dir}" "${LIGHTER_CANDIDATE_ROOT}"
          }
          trap cleanup EXIT
          /bin/chmod 700 "${private_dir}"

          .github/scripts/download-r2-object.sh \
            "${LIGHTER_PRIVATE_FIXTURE_R2_PATH}" \
            "${private_fixture}" \
            "${LIGHTER_PRIVATE_FIXTURE_SHA256}"

          unset R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET_ENDPOINT
          installed_sha256="$(
            /usr/bin/shasum -a 256 "${LIGHTER_CANDIDATE_ROOT}/target/release/prove" |
              /usr/bin/awk '{ print $1 }'
          )"
          [[ "${installed_sha256}" == "${LIGHTER_CANDIDATE_SHA256}" ]]
          LIGHTER_FIXTURE="${private_fixture}" ./benchmark.sh

      - name: Upload score
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighter-prover-score-${{ github.run_id }}-${{ github.run_attempt }}
          path: score.json
          if-no-files-found: error
